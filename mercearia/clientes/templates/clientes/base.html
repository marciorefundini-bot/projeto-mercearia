<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mercearia da Neusa{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: #2c3e50;
            padding-top: 1rem;
        }
        .sidebar .nav-link {
            color: #bdc3c7;
            padding: .55rem 1.2rem;
            border-radius: 6px;
            margin: 2px 8px;
            font-size: .92rem;
        }
        .sidebar .nav-link:hover { color: #fff; background-color: #3d5166; }
        .sidebar .nav-link.active { color: #fff; background-color: #1a252f; font-weight: 600; }
        .sidebar .nav-link i { margin-right: 7px; }
        .sidebar hr { border-color: #4a6178; margin: .5rem 1rem; }
        .sidebar .section-label {
            color: #7f8c8d;
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            padding: .4rem 1.4rem;
        }
        .card { border: none; border-radius: 10px; }
        .card-stat { border-left: 4px solid; }
        .card-stat.clientes  { border-color: #3498db; }
        .card-stat.produtos  { border-color: #27ae60; }
        .card-stat.fiados    { border-color: #e74c3c; }
        .card-stat.criticos  { border-color: #f39c12; }
        .table thead th { font-size: .85rem; text-transform: uppercase; letter-spacing: .04em; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3 shadow-sm" style="height:56px;">
    <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
        <i class="bi bi-shop me-2"></i>MERCEARIA DA NEUSA
    </a>
    <span class="text-secondary small">Sistema de Gestão</span>
</nav>

<div class="container-fluid p-0">
    <div class="row g-0">

        <!-- Sidebar -->
        <nav class="col-md-2 sidebar d-none d-md-block">
            <div class="section-label mt-2">Menu</div>
            <ul class="nav flex-column">
                <li>
                    <a class="nav-link {% block nav_dashboard %}{% endblock %}" href="{% url 'dashboard' %}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a class="nav-link {% block nav_clientes %}{% endblock %}" href="{% url 'lista_clientes' %}">
                        <i class="bi bi-people"></i> Clientes
                    </a>
                </li>
                <li>
                    <a class="nav-link {% block nav_produtos %}{% endblock %}" href="{% url 'lista_produtos' %}">
                        <i class="bi bi-box-seam"></i> Produtos
                    </a>
                </li>
                <li>
                    <a class="nav-link {% block nav_fiados %}{% endblock %}" href="{% url 'lista_fiados' %}">
                        <i class="bi bi-receipt"></i> Fiados
                    </a>
                </li>
            </ul>
            <hr>
            <div class="section-label">Atalhos</div>
            <ul class="nav flex-column">
                <li>
                    <a class="nav-link" href="{% url 'criar_cliente' %}">
                        <i class="bi bi-person-plus"></i> Novo Cliente
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="{% url 'criar_fiado' %}">
                        <i class="bi bi-plus-circle"></i> Novo Fiado
                    </a>
                </li>
            </ul>
            <hr>
            <ul class="nav flex-column">
                <li>
                    <a class="nav-link" href="/admin/" target="_blank">
                        <i class="bi bi-gear"></i> Painel Admin
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Conteúdo principal -->
        <main class="col-md-10 p-4">
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
