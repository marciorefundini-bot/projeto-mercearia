{% extends 'clientes/base.html' %}
{% block title %}Confirmar Exclusão — Mercearia da Neusa{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0 text-danger">
        <i class="bi bi-exclamation-triangle me-2"></i>Confirmar Exclusão
    </h2>
</div>

<div class="card shadow-sm border-danger" style="max-width: 500px;">
    <div class="card-body p-4">
        <p class="fs-5 mb-1">
            Tem certeza que deseja excluir <strong>{{ objeto }}</strong>?
        </p>
        <p class="text-muted small mb-4">
            <i class="bi bi-info-circle"></i> Esta ação não pode ser desfeita.
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger px-4">
                    <i class="bi bi-trash"></i> Sim, excluir
                </button>
                <a href="{{ voltar_url }}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
